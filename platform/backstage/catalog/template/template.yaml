apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: web-application
  title: Web Application
  description: >
    Golden-path template for a Node.js web application.
    Creates a GitHub repo, deploys to AWS EKS via ArgoCD, provisions
    backing services via Crossplane, and registers everything in the catalog.
  tags: [nodejs, recommended]
spec:
  owner: group:default/admins
  type: service

  parameters:
    # ── Step 1: Application Details ──────────────────────────────────────────
    - title: Application Details
      required: [name, owner, repoUrl]
      properties:
        name:
          title: Application Name
          type: string
          description: Lowercase letters, numbers, and hyphens only (e.g. my-app)
          pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
          maxLength: 30
          ui:autofocus: true
        owner:
          title: Owner Team
          type: string
          description: Team that owns this application (must exist in the catalog)
          default: team-demo
        runtime:
          title: Runtime
          type: string
          default: nodejs20
          enum: [nodejs20]
          enumNames: ["Node.js 20 LTS"]
          description: Application runtime (more options coming soon)
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

    # ── Step 2: Deployment Targets ────────────────────────────────────────────
    - title: Deployment Targets
      description: >
        Choose where to deploy. Additional targets are planned for future releases.
      properties:
        deployAws:
          title: "✅ AWS — eu-central-1 (EKS)"
          type: boolean
          default: true
          description: Deploy to the shared AWS EKS cluster (always enabled)
          ui:readonly: true
        deployStackit:
          title: "STACKIT Standard — Coming Soon"
          type: boolean
          default: false
          description: STACKIT deployment is not yet available in this IDP version
          ui:disabled: true
        deployTencent:
          title: "Tencent Cloud China — Coming Soon"
          type: boolean
          default: false
          description: Tencent Cloud deployment is not yet available in this IDP version
          ui:disabled: true

    # ── Step 3: Backing Services ──────────────────────────────────────────────
    - title: Backing Services
      description: >
        Select the managed services your application needs.
        Each enabled service is provisioned by Crossplane and
        connection credentials are injected automatically.
      properties:
        postgresql:
          title: PostgreSQL
          type: object
          properties:
            enabled:
              title: Enable PostgreSQL
              type: boolean
              default: false
            size:
              title: Instance Size
              type: string
              default: small
              enum: [small, medium, large]
              enumNames:
                - "Small — db.t3.micro (dev/test)"
                - "Medium — db.t3.small (production)"
                - "Large — db.t3.medium (high traffic)"
        redis:
          title: Redis Cache
          type: object
          properties:
            enabled:
              title: Enable Redis
              type: boolean
              default: false
            size:
              title: Instance Size
              type: string
              default: small
              enum: [small, medium]
              enumNames:
                - "Small — cache.t3.micro"
                - "Medium — cache.t3.small"
        objectStorage:
          title: Object Storage (S3)
          type: object
          properties:
            enabled:
              title: Enable Object Storage
              type: boolean
              default: false
            publicRead:
              title: Public read access
              type: boolean
              default: false
        mongodb:
          title: MongoDB — Coming Soon
          type: object
          properties:
            enabled:
              title: Enable MongoDB
              type: boolean
              default: false
              ui:disabled: true
        messageQueue:
          title: Message Queue — Coming Soon
          type: object
          properties:
            enabled:
              title: Enable Message Queue
              type: boolean
              default: false
              ui:disabled: true

    # ── Step 4: Observability ─────────────────────────────────────────────────
    - title: Observability
      description: >
        Configure alerting and reliability targets.
        A Grafana dashboard is created automatically for every application.
      properties:
        alertEmail:
          title: Alert Email
          type: string
          format: email
          description: Email address to receive alerts (optional)
        sloTarget:
          title: Availability SLO (%)
          type: number
          default: 99.5
          minimum: 90
          maximum: 99.99
          description: Availability target — stored as a catalog annotation

  steps:
    # 1. Generate app skeleton from the content/ template
    - id: fetch-base
      name: Generate App Skeleton
      action: fetch:template
      input:
        url: ./content
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          runtime: ${{ parameters.runtime }}
          postgresql:
            enabled: ${{ parameters.postgresql.enabled if parameters.postgresql else false }}
            size: ${{ parameters.postgresql.size if parameters.postgresql else 'small' }}
          redis:
            enabled: ${{ parameters.redis.enabled if parameters.redis else false }}
            size: ${{ parameters.redis.size if parameters.redis else 'small' }}
          objectStorage:
            enabled: ${{ parameters.objectStorage.enabled if parameters.objectStorage else false }}
            publicRead: ${{ parameters.objectStorage.publicRead if parameters.objectStorage else false }}
          sloTarget: ${{ parameters.sloTarget | default(99.5) }}
          alertEmail: ${{ parameters.alertEmail | default('') }}

    # 2. Create private GitHub repo and push skeleton
    - id: publish
      name: Create GitHub Repository
      action: publish:github
      input:
        description: "${{ parameters.name }} — created by IDP PoC"
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        repoVisibility: private

    # 3. Generate the ArgoCD Application manifest
    # Repos are private; ArgoCD accesses them via the global github-repo-creds
    # credential template (HTTPS + GITHUB_TOKEN) — no per-repo SSH key needed.
    - id: fetch-argocd
      name: Generate ArgoCD Manifest
      action: fetch:template
      input:
        url: ./argocd
        targetPath: .argocd
        values:
          name: ${{ parameters.name }}
          remoteUrl: ${{ steps['publish'].output.remoteUrl }}

    # 5. Push ArgoCD manifest to the platform repo (apps/ directory)
    - id: register-argocd
      name: Register in ArgoCD
      action: github:repo:push
      input:
        repoUrl: github.com?repo=idp-poc&owner=danielweber90
        branch: master
        sourcePath: .argocd

    # 6. Register the new component in the Backstage catalog
    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

    # 7. Notify all users
    - id: notify
      name: Notify
      action: notification:send
      input:
        recipients: broadcast
        title: "New app: ${{ parameters.name }}"
        info: "Application ${{ parameters.name }} was created by ${{ parameters.owner }} and is deploying to AWS."
        severity: normal

  output:
    links:
      - title: GitHub Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: ArgoCD Application
        url: https://idp-poc.impact-tracking.dev.uptimize.merckgroup.com/argocd/applications/argocd/${{ parameters.name }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
      - title: Live URL
        url: https://idp-poc.impact-tracking.dev.uptimize.merckgroup.com/${{ parameters.name }}
