apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-app
  namespace: {{ .Release.Namespace }}
data:
  index.js: |
    const http = require('http');
    const PORT = parseInt(process.env.PORT || '{{ .Values.app.port }}', 10);
    const APP_NAME = '{{ .Release.Name }}';

    const server = http.createServer((req, res) => {
      if (req.url === '/health' || req.url === '/healthz') {
        res.writeHead(200, { 'Content-Type': 'application/json' });
        res.end(JSON.stringify({ status: 'ok', app: APP_NAME }));
        return;
      }
      if (req.url === '/metrics') {
        res.writeHead(200, { 'Content-Type': 'text/plain' });
        res.end('# HELP http_requests_total Total HTTP requests\n' +
          '# TYPE http_requests_total counter\n' +
          'http_requests_total{app="' + APP_NAME + '",status="200"} 1\n');
        return;
      }
      res.writeHead(200, { 'Content-Type': 'text/html; charset=utf-8' });
      res.end('<!DOCTYPE html><html><head><title>' + APP_NAME + '</title></head><body>' +
        '<h1>' + APP_NAME + '</h1>' +
        '<p>Deployed via IDP PoC GitOps</p>' +
        '</body></html>');
    });

    server.listen(PORT, () => {
      console.log(APP_NAME + ' listening on port ' + PORT);
    });
