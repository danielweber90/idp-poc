apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: demo-app
  title: "IDP PoC Demo App"
  description: "Full IDP developer experience end-to-end"
  annotations:
    argocd/app-name: demo-app
    backstage.io/kubernetes-id: demo-app
    grafana/dashboard-selector: "app=demo-app"
  tags: [nodejs, postgresql, redis, poc]
spec:
  type: service
  lifecycle: experimental
  owner: team-demo
  dependsOn:
    - resource:demo-app-db
    - resource:demo-app-redis
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: demo-app-db
  description: "PostgreSQL 15 database provisioned by Crossplane → AWS RDS"
  annotations:
    backstage.io/kubernetes-id: demo-app
spec:
  type: database
  owner: group:default/team-demo
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: demo-app-redis
  description: "Redis 7 cache provisioned by Crossplane → AWS ElastiCache"
  annotations:
    backstage.io/kubernetes-id: demo-app
spec:
  type: cache
  owner: group:default/team-demo
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: team-demo
spec:
  type: team
  children: []
  members: []
