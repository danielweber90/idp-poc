backstage:
  image:
    registry: 084375542523.dkr.ecr.eu-central-1.amazonaws.com
    repository: idp-poc/backstage
    tag: latest

  extraEnvVarsSecrets:
    - backstage-secrets

  appConfig:
    app:
      title: "IDP PoC Developer Portal"
      baseUrl: http://ab8d1efe13ac04f1f8fd382b3aabd806-1571709816.eu-central-1.elb.amazonaws.com/backstage

    packages: all

    extensions:
      # Configure the catalog index page to be the root page, this is normally mounted on /catalog
      - page:catalog:
          config:
            path: /

    backend:
      # Kong uses strip-path:true so /backstage/* → /* before reaching Backstage.
      # Keep /backstage here so the frontend builds API URLs as /backstage/api/... which strip-path then strips.
      baseUrl: http://ab8d1efe13ac04f1f8fd382b3aabd806-1571709816.eu-central-1.elb.amazonaws.com/backstage
      listen:
        port: 7007
      csp:
        upgrade-insecure-requests: false
      cors:
        origin: http://ab8d1efe13ac04f1f8fd382b3aabd806-1571709816.eu-central-1.elb.amazonaws.com
      database:
        client: pg
        connection:
          host: ${POSTGRES_HOST}
          port: ${POSTGRES_PORT}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}
      actions:
        pluginSources:
          - auth
          - catalog
          - scaffolder

    auth:
      environment: development
      providers:
        github:
          development:
            clientId: Iv23licyyL9dmP3zCmdk
            clientSecret: ${GITHUB_CLIENT_SECRET}
            signIn:
              resolvers:
                - resolver: usernameMatchingUserEntityName

    integrations:
      github:
        - host: github.com
          token: ${GITHUB_TOKEN}

    catalog:
      import:
        entityFilename: catalog-info.yaml
        pullRequestBranchName: backstage-integration
      rules:
        - allow: [Component, System, Group, Resource, API, Location]
      locations:
        - type: url
          target: https://github.com/${GITHUB_ORG}/idp-poc/blob/master/platform/backstage/catalog/demo-app.yaml
        # Org catalog (users, groups) — add users here, no image rebuild needed
        - type: url
          target: https://github.com/${GITHUB_ORG}/idp-poc/blob/master/platform/backstage/catalog/org.yaml
          rules:
            - allow: [User, Group]
        - type: url
          target: https://github.com/${GITHUB_ORG}/idp-poc/blob/master/platform/backstage/catalog/entities.yaml

        # Local example template
        - type: url
          target: https://github.com/${GITHUB_ORG}/idp-poc/blob/master/platform/backstage/catalog/template/template.yaml
          rules:
            - allow: [Template]
      

    kubernetes:
      serviceLocatorMethod:
        type: multiTenant
      clusterLocatorMethods:
        - type: config
          clusters:
            - url: https://kubernetes.default.svc
              name: idp-poc
              authProvider: serviceAccount
              serviceAccountToken: ${K8S_SA_TOKEN}
              skipTLSVerify: true

    # see https://backstage.io/docs/permissions/getting-started for more on the permission framework
    permission:
      # setting this to `false` will disable permissions
      enabled: true

    # see https://backstage.io/docs/ai/mcp-actions for more details
    mcpActions:
      name: 'My Company Backstage' # defaults to "backstage"
      description: 'Tools for managing your software catalog, creating new services from templates, and exploring your developer portal' # optional

    
    argocd:
      username: admin
      password: ${ARGOCD_AUTH_TOKEN}
      appLocatorMethods:
        - type: config
          instances:
            - name: main
              url: http://argocd-server.argocd.svc.cluster.local

    grafana:
      domain: http://kube-prometheus-stack-grafana.platform-monitoring.svc.cluster.local

# In-cluster PostgreSQL — simpler than wiring external RDS for Backstage
postgresql:
  enabled: true
  auth:
    username: backstage
    password: backstage-poc-db
    database: backstage
  primary:
    persistence:
      enabled: true
      size: 2Gi

ingress:
  enabled: false   # We use Kong ingress manually
