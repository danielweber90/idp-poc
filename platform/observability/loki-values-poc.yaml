# Loki values for IDP PoC (single-binary mode)
deploymentMode: SingleBinary
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 5Gi

# Required in Loki v6+: explicitly zero out scalable-mode components
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Reduce cache from default 8192 MB to PoC-appropriate 256 MB
chunksCache:
  allocatedMemory: 256
