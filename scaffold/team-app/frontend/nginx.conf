server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the SPA — all unmatched paths return index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
}
