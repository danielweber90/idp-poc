# Kong Ingress Controller values for IDP PoC
controller:
  ingressClass: kong
  installCRDs: false

proxy:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:eu-central-1:084375542523:certificate/8bdce501-08ba-4b1b-926c-e2fd85a6db64"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"

# CLB terminates TLS, forwards plain HTTP to Kong's HTTP listener on port 8000.
# - http.servicePort=443: service port 443 → containerPort 8000 (Kong HTTP)
# - tls.enabled=false: no Kong TLS listener (CLB owns TLS, Kong doesn't need it)
# - crds.enabled=false: CRDs already installed by controller sub-chart; prevents
#   duplicate CRD resources that break ArgoCD's diff calculation.
gateway:
  crds:
    enabled: false
  proxy:
    http:
      containerPort: 8000
      servicePort: 443
    tls:
      enabled: false
