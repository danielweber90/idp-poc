# Kong Ingress Controller values for IDP PoC
controller:
  ingressClass: kong
  installCRDs: false

proxy:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:eu-central-1:084375542523:certificate/8bdce501-08ba-4b1b-926c-e2fd85a6db64"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"

# Override gateway sub-chart: redirect port 443 to Kong's HTTP port (8000)
# so the CLB can terminate TLS and forward plain HTTP to Kong.
# Without this, port 443 targets Kong's TLS port (8443) which rejects
# plain HTTP with "The plain HTTP request was sent to HTTPS port".
gateway:
  proxy:
    tls:
      containerPort: 8000
