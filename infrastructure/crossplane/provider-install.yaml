# DeploymentRuntimeConfig: injects IRSA role ARN into provider service accounts
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: provider-aws
spec:
  serviceAccountTemplate:
    metadata:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::084375542523:role/idp-poc-crossplane-provider
---
# Family provider — installs shared CRDs and the ProviderConfig API
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-aws-family
spec:
  package: xpkg.upbound.io/upbound/provider-family-aws:v1.23.2
  runtimeConfigRef:
    name: provider-aws
---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-aws-rds
spec:
  package: xpkg.upbound.io/upbound/provider-aws-rds:v1.23.2
  runtimeConfigRef:
    name: provider-aws
---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-aws-elasticache
spec:
  package: xpkg.upbound.io/upbound/provider-aws-elasticache:v1.23.2
  runtimeConfigRef:
    name: provider-aws
---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-aws-s3
spec:
  package: xpkg.upbound.io/upbound/provider-aws-s3:v1.23.2
  runtimeConfigRef:
    name: provider-aws
