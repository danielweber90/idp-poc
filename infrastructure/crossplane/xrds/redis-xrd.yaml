apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: redisinstances.platform.idp-poc.io
spec:
  group: platform.idp-poc.io
  names:
    kind: RedisInstance
    plural: redisinstances
  claimNames:
    kind: RedisClaim
    plural: redisclaims
  connectionSecretKeys:
    - host
    - port

  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [parameters]
              properties:
                parameters:
                  type: object
                  properties:
                    size:
                      type: string
                      enum: [small, medium]
                      default: small
                    version:
                      type: string
                      default: "7"
                writeConnectionSecretToRef:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
