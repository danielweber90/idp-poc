apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: redisinstance-aws
  labels:
    provider: aws
spec:
  compositeTypeRef:
    apiVersion: platform.idp-poc.io/v1alpha1
    kind: RedisInstance
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: elasticache
            base:
              apiVersion: elasticache.aws.upbound.io/v1beta1
              kind: ReplicationGroup
              spec:
                forProvider:
                  region: eu-central-1
                  description: IDP PoC Redis
                  nodeType: cache.t3.micro
                  numCacheClusters: 1
                  engineVersion: "7.1"
                  # Private subnets + security group matching the Tofu-provisioned setup
                  subnetGroupName: idp-poc-redis
                  securityGroupIds:
                    - sg-0cf6359fa805304c1
                writeConnectionSecretToRef:
                  namespace: crossplane-system
                  name: ""
            patches:
              # Use claim name as the ReplicationGroup ID to stay under the 40-char limit.
              # The auto-generated XR name (claim + random suffix) exceeds 40 chars for
              # typical app names. crossplane.io/claim-name is always set on the XR.
              - fromFieldPath: "metadata.labels[crossplane.io/claim-name]"
                toFieldPath: metadata.name
              - fromFieldPath: "metadata.labels[crossplane.io/claim-name]"
                toFieldPath: spec.writeConnectionSecretToRef.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-conn"
            connectionDetails:
              - name: host
                type: FromConnectionSecretKey
                fromConnectionSecretKey: primaryEndpointAddress
              - name: port
                type: FromValue
                value: "6379"
