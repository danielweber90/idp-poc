# ArgoCD Helm values for IDP PoC
global:
  domain: argocd.idp-poc.local

server:
  replicas: 1   # PoC: single replica
  extraArgs:
    - --insecure  # disable TLS termination at ArgoCD (handled by ingress)

configs:
  params:
    server.insecure: true

  cm:
    # Allow anonymous read access for PoC demo
    users.anonymous.enabled: "false"
    # Resource tracking: label-based (most reliable)
    application.resourceTrackingMethod: label

applicationSet:
  replicas: 1

redis:
  enabled: true  # built-in Redis for PoC
